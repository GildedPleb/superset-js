# litestream.yml
# Example configuration for Litestream.
# Used by the sidecar in production and as reference for local dev.
#
# In production the Helm chart will mount this (or use env vars) and
# point at the cluster-internal MinIO service.
#
# Local dev script uses inline flags for simplicity.

dbs:
  - path: /data/superset.db
    replicas:
      - type: s3
        endpoint: http://minio.minio.svc.cluster.local:9000   # cluster-internal
        bucket: superset-js
        path: superset.db
        # access-key-id and secret-access-key come from Secret / env in the pod
        # Or use:
        # access-key-id: ${MINIO_ACCESS_KEY}
        # secret-access-key: ${MINIO_SECRET_KEY}
