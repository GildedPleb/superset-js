# Litestream configuration example
# Used by:
#   - Production sidecar (mounted or env-expanded)
#   - Local dev script (via port-forward to localhost:9000)
#
# Customize endpoint, bucket, and credentials as needed.
# For production Helm: inject via ConfigMap + Secret or environment variables.

dbs:
  - path: /data/superset.db          # Production path inside pod
    # For local dev the script overrides with ./data/superset.db
    replicas:
      - type: s3
        bucket: superset-js                 # <-- Change if you prefer a different bucket name
        path: litestream/superset-js/
        endpoint: http://minio.minio.svc.cluster.local:9000   # Cluster-internal for sidecar
        # For local dev script we port-forward and can override or use localhost in a separate config
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_ACCESS_KEY_SECRET}
        # sync-interval, etc. can be added
